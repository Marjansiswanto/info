<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TRACK-ME — Dashboard SAR</title>
  <link rel="manifest" href="manifest-gojek.json">
  <meta name="theme-color" content="#0B7A5B">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <!-- Google Font: Plus Jakarta Sans (gratis, modern) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Leaflet CSS & JS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- ================================================================
       SISTEM DESAIN PREMIUM — Terinspirasi Gojek, disempurnakan untuk Web
       ================================================================ -->
  <style>
    /* ===== 1. VARIABEL DESAIN (Color System + Spacing) ===== */
    :root {
      /* Primary */
      --primary: #0B7A5B;
      --primary-dark: #065C43;
      --primary-light: #E3F3EC;
      --primary-gradient: linear-gradient(135deg, #0B7A5B, #065C43);

      /* Secondary */
      --secondary: #FF9F1C;
      --secondary-light: #FFF4E5;

      /* Semantik */
      --success: #12B76A;
      --error: #E5484D;
      --error-light: #FDECEC;
      --warning: #FF9F1C;

      /* Netral */
      --bg: #F7F8FA;
      --surface: #FFFFFF;
      --text-primary: #1A1D1F;
      --text-secondary: #6E7580;
      --text-muted: #A0A8B4;
      --divider: #E4E7EB;
      --border: #D8DCE1;

      /* Shadow system — bertingkat */
      --shadow-xs: 0 1px 2px rgba(16, 24, 40, 0.04);
      --shadow-sm: 0 1px 3px rgba(16, 24, 40, 0.08), 0 1px 2px rgba(16, 24, 40, 0.04);
      --shadow-md: 0 4px 12px rgba(11, 122, 91, 0.08);
      --shadow-lg: 0 8px 24px rgba(11, 122, 91, 0.12);
      --shadow-xl: 0 16px 48px rgba(11, 122, 91, 0.16);

      /* Radius */
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;

      /* Spacing (kelipatan 4) */
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 16px;
      --space-lg: 24px;
      --space-xl: 32px;

      /* Font */
      --font: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;

      /* Transisi */
      --ease: cubic-bezier(0.25, 0.46, 0.45, 0.94);
      --duration: 0.25s;

      /* Sidebar */
      --sidebar-width: 240px;
    }

    /* ===== 2. RESET & BASE ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
    }

    /* ===== 3. SCROLLBAR KUSTOM ===== */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg);
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--primary);
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--primary-dark);
    }

    /* ===== 4. SIDEBAR (Desktop) ===== */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: var(--sidebar-width);
      height: 100vh;
      background: var(--primary-gradient);
      padding: var(--space-lg) var(--space-md);
      display: flex;
      flex-direction: column;
      z-index: 1000;
      transition: transform var(--duration) var(--ease);
      box-shadow: 4px 0 20px rgba(11, 122, 91, 0.15);
    }

    .sidebar-brand {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      padding-bottom: var(--space-lg);
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
      margin-bottom: var(--space-lg);
    }

    .sidebar-brand .logo-icon {
      width: 36px;
      height: 36px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 800;
      font-size: 16px;
    }

    .sidebar-brand .logo-text {
      color: #fff;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: -0.3px;
    }
    .sidebar-brand .logo-text small {
      font-weight: 400;
      font-size: 11px;
      opacity: 0.7;
      display: block;
      letter-spacing: 0.3px;
    }

    .sidebar-nav {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: var(--space-xs);
    }

    .sidebar-nav .nav-label {
      color: rgba(255, 255, 255, 0.4);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      padding: var(--space-md) 0 var(--space-xs) var(--space-sm);
    }

    .sidebar-nav a,
    .sidebar-nav button {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      padding: 10px var(--space-md);
      border-radius: var(--radius-md);
      color: rgba(255, 255, 255, 0.7);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      background: transparent;
      border: none;
      width: 100%;
      cursor: pointer;
      font-family: var(--font);
      transition: all var(--duration) var(--ease);
      text-align: left;
    }

    .sidebar-nav a:hover,
    .sidebar-nav button:hover {
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
    }

    .sidebar-nav a.active,
    .sidebar-nav button.active {
      background: rgba(255, 255, 255, 0.18);
      color: #fff;
      border-left: 3px solid #fff;
    }

    .sidebar-nav a .nav-icon,
    .sidebar-nav button .nav-icon {
      font-size: 20px;
      width: 24px;
      text-align: center;
      flex-shrink: 0;
    }

    .sidebar-nav a .nav-badge,
    .sidebar-nav button .nav-badge {
      margin-left: auto;
      background: var(--secondary);
      color: #1A1D1F;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
    }

    .sidebar-footer {
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      padding-top: var(--space-md);
      margin-top: auto;
    }

    .sidebar-footer .user-card {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      padding: var(--space-sm) var(--space-sm);
      border-radius: var(--radius-md);
      color: rgba(255, 255, 255, 0.8);
    }

    .sidebar-footer .user-card .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      color: #fff;
    }

    .sidebar-footer .user-card .user-info {
      flex: 1;
    }
    .sidebar-footer .user-card .user-info .name {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
    }
    .sidebar-footer .user-card .user-info .role {
      font-size: 11px;
      opacity: 0.6;
    }
    .sidebar-footer .user-card .user-info .role .badge-role {
      background: rgba(255, 255, 255, 0.15);
      padding: 1px 8px;
      border-radius: 20px;
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    /* ===== 5. MAIN CONTENT ===== */
    .main-content {
      margin-left: var(--sidebar-width);
      flex: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ===== 6. HEADER (Glassmorphism) ===== */
    .app-header {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--divider);
      padding: 12px var(--space-lg);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      min-height: 64px;
    }

    .app-header .header-left {
      display: flex;
      align-items: center;
      gap: var(--space-md);
    }

    .app-header .header-left .hamburger {
      display: none;
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: var(--text-primary);
      padding: 4px;
    }

    .app-header .header-left .greeting {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .app-header .header-left .greeting small {
      font-weight: 400;
      font-size: 14px;
      color: var(--text-secondary);
      display: block;
    }

    .app-header .header-right {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }

    .app-header .header-right .search-box {
      display: flex;
      align-items: center;
      background: var(--bg);
      border: 1.5px solid var(--divider);
      border-radius: var(--radius-lg);
      padding: 6px 14px;
      gap: 8px;
      transition: all var(--duration) var(--ease);
    }
    .app-header .header-right .search-box:focus-within {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(11, 122, 91, 0.12);
    }
    .app-header .header-right .search-box input {
      border: none;
      background: transparent;
      font-family: var(--font);
      font-size: 13px;
      color: var(--text-primary);
      outline: none;
      width: 160px;
      padding: 4px 0;
    }
    .app-header .header-right .search-box input::placeholder {
      color: var(--text-muted);
    }
    .app-header .header-right .search-box .search-icon {
      color: var(--text-muted);
      font-size: 16px;
    }

    .header-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--duration) var(--ease);
      position: relative;
    }

    .header-btn:hover {
      background: var(--bg);
      color: var(--primary);
    }

    .header-btn .badge-dot {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 8px;
      height: 8px;
      background: var(--error);
      border-radius: 50%;
      border: 2px solid #fff;
    }

    .header-btn .badge-num {
      position: absolute;
      top: 4px;
      right: 4px;
      background: var(--error);
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 20px;
      border: 2px solid #fff;
      min-width: 18px;
      text-align: center;
    }

    /* ===== 7. DASHBOARD CONTENT ===== */
    .dashboard-content {
      padding: var(--space-lg);
      flex: 1;
      max-width: 1280px;
      width: 100%;
      margin: 0 auto;
    }

    /* ===== 8. DISCLAIMER BANNER ===== */
    .disclaimer-banner {
      background: var(--secondary-light);
      border-bottom: 2px solid var(--secondary);
      color: #92400E;
      font-size: 12px;
      padding: 8px 20px;
      text-align: center;
      font-weight: 500;
    }
    .disclaimer-banner b {
      color: var(--primary);
    }

    /* ===== 9. INSTALL BANNER (PWA) ===== */
    #install-banner {
      background: var(--secondary-light);
      border-bottom: 2px solid var(--secondary);
      color: #92400E;
      padding: 10px 20px;
      font-size: 12.5px;
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    #install-banner.show {
      display: flex;
    }
    #install-banner b {
      color: var(--primary);
    }
    #install-btn {
      background: var(--primary);
      color: #fff;
      border: none;
      font-family: var(--font);
      font-weight: 600;
      padding: 8px 20px;
      font-size: 12px;
      cursor: pointer;
      border-radius: var(--radius-md);
      transition: all var(--duration) var(--ease);
    }
    #install-btn:hover {
      background: var(--primary-dark);
      transform: scale(1.02);
    }
    #install-dismiss-btn {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--divider);
      font-family: var(--font);
      padding: 8px 16px;
      font-size: 12px;
      cursor: pointer;
      border-radius: var(--radius-md);
      transition: all var(--duration) var(--ease);
    }
    #install-dismiss-btn:hover {
      background: var(--bg);
    }

    /* ===== 10. AUTH GATE (Card Login) ===== */
    #auth-gate {
      min-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-lg);
    }

    #auth-card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      max-width: 420px;
      width: 100%;
      padding: 32px 28px;
      border: 1px solid var(--divider);
      transition: all var(--duration) var(--ease);
    }

    #auth-card h2 {
      font-size: 22px;
      font-weight: 700;
      margin: 0 0 4px 0;
      letter-spacing: -0.5px;
    }
    #auth-card h2 .accent {
      color: var(--primary);
    }

    #auth-card p.sub {
      font-size: 13px;
      color: var(--text-secondary);
      margin: 0 0 20px 0;
      line-height: 1.6;
    }

    #auth-card input {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--divider);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: var(--font);
      padding: 12px 14px;
      font-size: 14px;
      margin-bottom: 12px;
      transition: all var(--duration) var(--ease);
    }
    #auth-card input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(11, 122, 91, 0.12);
      outline: none;
    }

    #auth-card button.primary {
      width: 100%;
      background: var(--primary);
      color: #fff;
      border: none;
      font-family: var(--font);
      font-weight: 600;
      padding: 14px;
      font-size: 14px;
      cursor: pointer;
      border-radius: var(--radius-md);
      transition: all var(--duration) var(--ease);
      margin-top: 4px;
    }
    #auth-card button.primary:hover {
      background: var(--primary-dark);
      transform: scale(1.01);
      box-shadow: var(--shadow-md);
    }
    #auth-card button.primary:active {
      transform: scale(0.98);
    }

    #auth-card button.secondary {
      width: 100%;
      background: transparent;
      border: 1.5px solid var(--divider);
      color: var(--text-secondary);
      font-family: var(--font);
      padding: 12px;
      font-size: 13px;
      cursor: pointer;
      border-radius: var(--radius-md);
      transition: all var(--duration) var(--ease);
      margin-top: 8px;
    }
    #auth-card button.secondary:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--primary-light);
    }

    #auth-status {
      font-size: 12px;
      min-height: 20px;
      margin-bottom: 8px;
      font-weight: 500;
    }
    #auth-status.err {
      color: var(--error);
    }
    #auth-status.ok {
      color: var(--success);
    }
    #auth-status.info {
      color: var(--secondary);
    }

    .hidden {
      display: none !important;
    }

    /* ===== 11. QUICK STATS CARDS ===== */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--space-md);
      margin-bottom: var(--space-lg);
    }

    .stat-card {
      background: var(--surface);
      border-radius: var(--radius-md);
      padding: var(--space-md) var(--space-lg);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--divider);
      transition: all var(--duration) var(--ease);
      position: relative;
      overflow: hidden;
    }

    .stat-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }

    .stat-card .stat-icon {
      position: absolute;
      top: var(--space-md);
      right: var(--space-md);
      font-size: 28px;
      opacity: 0.2;
    }

    .stat-card .stat-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    .stat-card .stat-value {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -1px;
      margin: 4px 0 2px;
      color: var(--text-primary);
    }

    .stat-card .stat-change {
      font-size: 12px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 20px;
    }
    .stat-card .stat-change.up {
      color: var(--success);
      background: #E6F9F0;
    }
    .stat-card .stat-change.down {
      color: var(--error);
      background: var(--error-light);
    }

    /* ===== 12. MAP & PERSONNEL GRID ===== */
    .dashboard-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: var(--space-lg);
      margin-bottom: var(--space-lg);
    }

    .panel {
      background: var(--surface);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--divider);
      overflow: hidden;
      transition: all var(--duration) var(--ease);
    }

    .panel:hover {
      box-shadow: var(--shadow-md);
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px var(--space-md);
      border-bottom: 1px solid var(--divider);
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .panel-head .tag {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 3px 10px;
      border-radius: 20px;
      background: var(--primary-light);
      color: var(--primary);
    }
    .panel-head .tag.warning {
      background: var(--secondary-light);
      color: #92400E;
    }
    .panel-head .tag.danger {
      background: var(--error-light);
      color: var(--error);
    }

    #sar-map {
      width: 100%;
      height: 420px;
    }
    .leaflet-container {
      background: var(--bg) !important;
    }

    /* ===== 13. PERSONNEL LIST ===== */
    .personnel-list {
      max-height: 420px;
      overflow-y: auto;
    }

    .personnel-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px var(--space-md);
      border-bottom: 1px solid var(--divider);
      font-size: 13px;
      transition: background var(--duration) var(--ease);
      cursor: default;
    }
    .personnel-row:hover {
      background: var(--bg);
    }

    .personnel-row .info {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }

    .personnel-row .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }
    .status-aman {
      background: var(--success);
    }
    .status-sos {
      background: var(--error);
      box-shadow: 0 0 8px var(--error);
      animation: pulse-dot 1.2s ease-in-out infinite;
    }
    .status-hilang {
      background: var(--warning);
    }

    @keyframes pulse-dot {
      0%,
      100% {
        transform: scale(1);
        opacity: 1;
      }
      50% {
        transform: scale(1.4);
        opacity: 0.6;
      }
    }

    .personnel-row .name {
      font-weight: 600;
    }
    .personnel-row .role-tag {
      font-size: 10px;
      font-weight: 500;
      color: var(--text-secondary);
      background: var(--bg);
      padding: 1px 8px;
      border-radius: 20px;
    }

    .personnel-row .actio
